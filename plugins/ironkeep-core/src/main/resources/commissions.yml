    objective-quantity: 15
    reward-amount: 155.0
    shards-reward: 90.0

  farming_carrot:
    type: FARMING
    display-name: "Carrot Harvest"
    description: "Harvest 15 carrots for the cook."
    objective-item: CARROTS
    turn-in-item: CARROT
    objective-quantity: 15
