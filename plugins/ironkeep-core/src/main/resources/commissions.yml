    display-name: "Lumber Run"
    description: "Chop 10 oak wood for the carpenter."
    objective-item: OAK_WOOD
    turn-in-item: OAK_WOOD
    objective-quantity: 10
    reward-amount: 160.0
    shards-reward: 95.0

  woodcutting_birch:
    type: WOODCUTTING
    display-name: "Birch Bundle"
    description: "Gather 10 birch wood for the fletcher."
    objective-item: BIRCH_WOOD
    turn-in-item: BIRCH_WOOD
    objective-quantity: 10
    reward-amount: 140.0
    shards-reward: 80.0

  # --- Farming — Rank 3 ---

  farming_wheat:
    type: FARMING
    display-name: "Wheat Harvest"
    description: "Harvest 15 wheat for the baker."
    objective-item: WHEAT
