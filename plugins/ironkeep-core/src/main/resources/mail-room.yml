# IronKeep Mail Room Configuration
# Controls the Mail Sorting commission type.

# Accuracy bonus: extra Gold Coins and Shards awarded based on delivery accuracy.
# Full bonus is granted at 100% accuracy; scales linearly down to 0% at 0% accuracy.
accuracy-bonus:
  max-gold-coins: 120.0
  max-shards: 70.0

# Difficulty per rank: how many mail items to sort and which destinations are active.
difficulty:
  rank1:
    mail-count: 4
    destinations:
      - Armory
      - Kitchen
      - Warden Office
      - Infirmary

  rank2:
    mail-count: 6
    destinations:
      - Armory
      - Kitchen
      - Warden Office
      - Infirmary
      - Guard Barracks
      - Storage

  rank3:
    mail-count: 8
    destinations:
      - Armory
      - Kitchen
      - Warden Office
      - Infirmary
      - Guard Barracks
      - Storage
      - Medical Bay
      - Records Room

  rank4:
    mail-count: 10
    destinations:
      - Armory
      - Kitchen
      - Warden Office
      - Infirmary
      - Guard Barracks
      - Storage
      - Medical Bay
      - Records Room
      - Chapel
      - Workshop

# Barrel locations: one BARREL block per destination.
barrels:
  - destination: Armory
    world: world
    x: 99
    y: 5
    z: -27
  - destination: Kitchen
