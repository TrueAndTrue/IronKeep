# IronKeep Zone Definitions
# Zones restrict where commission progress is tracked.
# Multiple zones per commission type are supported.
# Changes take effect on server restart.
#
# Fields:
#   world            - World name
#   x1, z1, x2, z2  - Corner coordinates (order doesn't matter)
#   y-min, y-max     - Y bounds (currently covers full height by default)
#   commission-types - List of commission type keys valid in this zone

# If block-without-zone is true (default), breaking blocks outside ANY zone does not count.
# Set to false to allow progress anywhere if no zone is configured for that type.
block-without-zone: true

# Block regeneration settings
# regen-delay-ticks: how many server ticks before a block regenerates (20 ticks = 1 second)
regen-delay-ticks: 60  # 3 seconds

# Placeholder blocks used while regeneration is pending
placeholders:
  mining: BEDROCK
  woodcutting: BEDROCK

zones:

  mining_zone:
    world: world
    x1: 84
    z1: -100
    x2: 102
    z2: 82
    y-min: 2
    y-max: 2
    border-y: 2           # Y level at which to place the Obsidian border ring on startup
    commission-types:
      - MINING_COAL
      - MINING_IRON
      - MINING_GOLD
      - MINING_DIAMOND

  woodcutting_zone:
    world: world
    x1: 102
    z1: -20
    x2: 84
    z2: -2
    y-min: 2
    y-max: 11
    commission-types:
      - WOODCUTTING

  farming_zone:
    world: world
    x1: 127
    z1: -82
    x2: 145
    z2: -100
    y-min: 2
    y-max: 3
    commission-types:
      - FARMING

  mail_room:
    world: world
    x1: 100
    z1: -36
    x2: 109
    z2: -23
    y-min: 2
    y-max: 12
    commission-types:
      - MAIL_SORTING

  kitchen:
    world: world
    x1: 127
    z1: -20
    x2: 145
    z2: -2
    y-min: 2
    y-max: 10
    commission-types:
      - COOKING
