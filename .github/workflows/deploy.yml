name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        working-directory: plugins/ironkeep-core
        run: |
          sed -i 's/\r//' gradlew
          chmod +x gradlew
  
      - name: Build plugin
        working-directory: plugins/ironkeep-core
        run: ./gradlew build -x deployPlugin --no-daemon

      - name: Find JAR
        id: jar
        run: |
          JAR=$(find plugins/ironkeep-core/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT

      - name: Upload JAR via SFTP
        run: |
          sshpass -p "${{ secrets.SFTP_PASS }}" \
            sftp -P ${{ secrets.SFTP_PORT }} \
              -o StrictHostKeyChecking=no \
              "${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}" <<EOF
          cd plugins
          put ${{ steps.jar.outputs.path }} ironkeep-core.jar
          bye
          EOF