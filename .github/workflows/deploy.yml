name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        working-directory: plugins/ironkeep-core
        run: chmod +x gradlew

      - name: Build plugin
        working-directory: plugins/ironkeep-core
        run: ./gradlew build -x deployPlugin --no-daemon
      - name: Find JAR
        id: jar
        run: |
          JAR=$(find plugins/ironkeep-core/build/libs -name "*.jar" ! -name "*-plain.jar" | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT

      - name: Upload JAR to Pterodactyl
        run: |
          UPLOAD_URL=$(curl -s \
            "${{ secrets.PTERODACTYL_URL }}/api/client/servers/${{ secrets.PTERODACTYL_SERVER_UUID }}/files/upload" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Accept: application/json" \
            | jq -r '.attributes.url')
          curl -s -X POST "$UPLOAD_URL" \
            -F "files=@${{ steps.jar.outputs.path }};filename=ironkeep-core.jar" \
            -F "root=/plugins"

      - name: Restart server
        run: |
          curl -s -X POST \
            "${{ secrets.PTERODACTYL_URL }}/api/client/servers/${{ secrets.PTERODACTYL_SERVER_UUID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"signal":"restart"}'